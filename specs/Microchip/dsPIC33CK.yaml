notes:
- "New yaml entry 2026-07-10 — Microchip dsPIC33CK Value Line digital signal controller family. The 16-bit
  DSC architecture (MCU + DSP) is unique to Microchip and gives it a unique position in motor control /
  digital power conversion markets. New Value Line sub-series launches May 2026 starting at $0.51."
- 'Use case: motor control (FOC for BLDC/PMSM/ACIM/Reluctance motors); digital power conversion
  (DC-DC, AC-DC, PFC, inverters); LED lighting; solar micro-inverters. 100 MIPS with 250 ps PWM
  resolution makes this the highest-precision motor control DSC in this price range.'
- 'Family differentiator vs STM32G4 (existing yaml): STM32G4 is Cortex-M4 @ 170 MHz with CORDIC + FMAC math
  accelerators; dsPIC33CK is 16-bit DSC @ 100 MIPS with DSP MAC engine. dsPIC33CK wins on DSP single-cycle
  MAC/MPY (vs Cortex-M4 MAC takes multiple cycles), dedicated motor-control peripherals (PTG + 8 PWM pairs +
  dead-time comp), and longer history in motor control (Microchip owns the market). STM32G4 wins on
  faster clock, 32-bit architecture, and broader peripheral set.'
- 'Family differentiator vs TI C2000 (e.g., TMS320F28004x): C2000 is 32-bit DSC @ 100-200 MHz with CLA
  coprocessor; dsPIC33CK is 16-bit DSC @ 100 MIPS without CLA. C2000 wins on higher frequency and 32-bit
  precision; dsPIC33CK wins on lower cost (~$0.51 starting price vs C2000 ~$5 starting price) and ease of
  use. Pick C2000 for high-end motor control / solar inverters; pick dsPIC33CK for cost-sensitive
  appliance / consumer motor control.'
- 'Verified 2026-07-10 via Tavily (extract_depth=advanced) on rs-online.com mirror PDF + product page:
  50+ spec fields filled including core/MIPS/Flash/RAM/PWM/timers/ADC/CAN-FD. 4 unverified fields remain
  where datasheet details vary per sub-variant.'
