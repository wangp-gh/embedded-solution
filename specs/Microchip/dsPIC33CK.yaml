specs:
  family: Microchip dsPIC33CK Single-Core Digital Signal Controllers (DSC family)
  cores:
  - 16-bit dsPIC33 CPU @ 100 MIPS (DC to 100 MHz operation)
  - DSP engine: single-cycle MAC/MPY with dual data fetch, 32-bit multiply support, 40-bit wide accumulators
  performance:
    mips: 100
    core_frequency_mhz: 100 (DC to 100 MHz operation)
    divide: fast 6-cycle divide
    loop: zero-overhead looping
    context_save: 4 sets of interrupt context saving registers
  memory:
    flash_kb_options: [32, 64, 128, 256]
    flash_ecc: yes (ECC on program Flash)
    ram_kb_options: [8, 16, 24]
    mbist: yes (RAM Memory Built-In Self-Test)
    live_update: yes (LiveUpdate runtime firmware swap)
  operating_conditions:
    voltage_v: '3.0-3.6 V'
    temperature_c: '-40 to +125 (DC to 100 MIPS); -40 to +150 (DC to 70 MIPS)'
  high_speed_pwm:
    pairs_count: 8 (PWM pairs)
    resolution_ps: 250 (picosecond PWM resolution)
    dead_time: yes (rising + falling edges)
    dead_time_compensation: yes
    clock_chopping: yes (high-frequency operation)
    fault_inputs: yes (fault and current limit)
    adc_trigger: yes (flexible trigger configuration)
    applications:
    - DC/DC converters
    - AC/DC
    - inverters + PFC (Power Factor Correction)
    - lighting
    - BLDC / PMSM / ACIM / SRM motors
  timers:
    ptg: yes (Peripheral Trigger Generator; up to 15 trigger sources, CPU-independent state machine)
    mccp_count: 1 (Multi-Capture/Compare/PWM)
    sccp_count: 8 (Single CCP)
    timer_modes: timer / capture / compare / PWM
    time_base_bits: [16, 32]
    capture_buffer_depth: 4
    sleep_operation: yes (fully asynchronous, available in Sleep modes)
  analog:
    adc_resolution_bits: 12
    adc_count: 2 (dual dedicated SAR)
    adc_sample_rate_msps: 2 (per ADC)
    dac: yes
    comparator: yes
    high_speed_adc_features:
    - 12-bit SAR with two dedicated ADCs
    - Up to 250 ps resolution
    - Hardware accumulation (averaging)
  motor_control_subfamily: 'dsPIC33CK_MC1 (e.g., CK64MC105, CK128MC506, CK256MC510)'
  communication:
    can_fd: yes (CAN Flexible Data)
    uart: 2x
    spi: 3x (8 MHz)
    i2c: 2x
    usb: not specified (some variants have USB)
    qei: yes (Quadrature Encoder Interface for motor commutation)
  package_options:
  - 28-pin
  - 36-pin
  - 48-pin
  - 64-pin
  - 80-pin
  security:
    flash_ecc: yes
  price:
    value_line_start_usd: 0.51 (at volume; CK256MP508-class)
    notes: 'Cost-optimized for motor control; 100 MIPS at $0.51 starting price (May 2026 launch)'
  use_cases:
  - Motor control (FOC for BLDC/PMSM, sensorless control)
  - Digital power conversion (DC-DC, AC-DC, PFC, inverters)
  - LED lighting drivers (high-resolution PWM)
  - Automotive body ECUs (Grade 1 qualified)
  - Industrial servo drives
  - Solar micro-inverters
  ecosystem:
