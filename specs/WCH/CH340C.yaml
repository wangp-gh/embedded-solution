specs:
  function: USB-to-UART (and USB-to-Printer / USB-to-SPI / USB-to-I2C) bridge
  usb:
    version: USB 2.0 Full Speed (12 Mbps)
    device_class: CDC-ACM (driver-free on Linux/macOS, needs driver on Windows)
  uart:
    baud_rate_max: 2 Mbps (typical up to 921600 stable)
    signals: TX, RX, RTS, CTS (hardware flow control)
  power:
    supply_voltage_v: 3.3-5.0
  package: SOP-16
  variants:
    CH340C: SOP-16, integrated 12 MHz crystal
    CH340N: SOP-8, no crystal (uses external)
    CH340E: ESSOP-10
    CH340B: SOP-16, with USB hub + multiple serial
    CH340G: SSOP-20
