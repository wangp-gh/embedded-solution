    i2s: 2x I2S
    sdio: 1x SDIO
    fsmc: 1x FSMC
    adc: 2 units x 16-channel 12-bit ADC + 16-channel TouchKey
    timers: 10 sets
    dma: 2x 18-channel DMA
    io_pins: 80
    external_interrupts: 16 (mappable)
  power:
    supply_voltage_v: 2.5/3.3
    modes:
    - Sleep
    - Stop
    - Standby
  features:
  - POR/PDR + Programmable Voltage Detector (PVD)
  - 96-bit unique ID
  - CRC calculation unit
  - 2-wire serial debug
