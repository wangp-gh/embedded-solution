- 'Family differentiator vs CH32V203: V303 has FPU, 4× SRAM (20→64KB), 4× Flash (64→256KB), 2× timers (4→10), SDIO + FSMC,
  double ADC, 2× DMA.'
- 'Family differentiator vs CH32V307: V303 is the same chip but lower USB (FS only); V307 adds USB HS + Ethernet MAC+PHY.
  For designs without USB HS / Ethernet, V303 is cheaper.'
