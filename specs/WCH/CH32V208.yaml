- 'Use case: industrial IoT gateways needing both wireless (BLE for commissioning) and wired (Ethernet for backhaul) in single
  chip. Replaces designs that previously needed 2 chips (e.g. CH32V203 + external Ethernet PHY + external BLE module).'
- "Family differentiator vs CH32V203: V208 adds BLE 5.3 + integrated Ethernet MAC+PHY, doubles Flash (64\u2192128KB) and SRAM\
  \ (20\u219264KB)."
- 'Family differentiator vs CH32V303: V208 adds wireless; V303 adds FPU + more UARTs/timers + SDIO/FSMC. Choose by wireless-vs-compute
  needs.'
- 'Cost note: BLE + Ethernet combo on RISC-V at ~$1.50 in qty 100 is competitive vs alternatives like STM32WB55 + external
  PHY.'
