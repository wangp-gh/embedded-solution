specs:
  cores:
  - QingKe V4C RISC-V @ up to 144 MHz (zero-wait, MPU, hardware div)
  memory:
    sram: 64 KB
    flash: 128 KB
  wireless:
    ble_version: '5.3'
  peripherals:
    ethernet: 10M MAC + PHY integrated
    usb: USB 2.0 FS (host/device + device)
    can: 1x CAN 2.0B active
    opamps: 2x OPA
    uart: 4x USART
    i2c: 2x I2C
    spi: 2x SPI
    adc: 16-channel 12-bit ADC + 16-channel TouchKey
    timers: 5 sets
    io_pins: 53
    external_interrupts: 16 (mappable)
  power:
    supply_voltage_v: 2.5/3.3
    modes:
    - Sleep
    - Stop
    - Standby
  features:
  - POR/PDR + Programmable Voltage Detector (PVD)
  - 96-bit unique ID
  - CRC calculation unit
  - 2-wire serial debug
  packages:
  - LQFP64M
  - QFN68
  - QFN48
  - QFN28
