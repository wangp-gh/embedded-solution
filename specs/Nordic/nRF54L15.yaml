specs:
  ble_version: '6.0'
  ram: 256 KB
  coremark: 503
  coremark_per_mw_3v: 193
  rx_sensitivity_dbm:
    ble_1m: -96
    ieee_802_15_4: -101
  tx_power_dbm:
    csp_max: 8
    qfn_max: 7
  operating_voltage_v: 1.7 to 3.6
  cores:
  - Arm Cortex-M33 @ 128 MHz with TrustZone
  - 128 MHz RISC-V coprocessor (SoftPeripherals support)
  flash: 1.5 MB (NVM)
  protocols:
    bluetooth_le:
    - Channel Sounding (BLE 6.0)
    - Bluetooth Mesh with NLC profiles
    - Bluetooth PAwR (Periodic Advertising with Responses) + ESL
    - 4 Mbps proprietary mode
    matter: yes (over BLE + 802.15.4)
    thread: yes (IEEE 802.15.4)
    zigbee: yes (IEEE 802.15.4)
    proprietary_2_4_ghz: yes (4 Mbps mode, low latency)
    ecosystems:
    - Amazon Sidewalk
    - Google Find Hub
    - Apple Find My
    - nRF Cloud (FOTA, device management)
  security:
    features:
    - Secure Boot
    - Secure Firmware Update
    - Secure Storage
    - TrustZone trusted execution environment
    - Cryptographic accelerator
    - Side-channel leakage protection
    - Tamper detection
  peripherals_highlights:
  - 1x high-speed SPI/UART
  - 4x SPI/TWI/UART
  - ADC (up to 14-bit with oversampling)
  - I2S, PDM, NFC, PWM, QDEC
  - "Global RTC (System-OFF capable, down to 0.8 \u03BCA @ 3.0 V)"
  package_options:
  - CSP47
  - QFN52
  - QFN48
  - QFN40
  fem_compatible: nRF21540 RF front-end module (BLE/mesh/2.4GHz proprietary/Thread/Zigbee)
