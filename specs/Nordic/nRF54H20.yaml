specs:
  cores:
  - Multiple Arm Cortex-M33 @ up to 320 MHz (application + radio + security domains; documented as 'multiple' in Nordic product page)
  - Multiple RISC-V coprocessors (documented as 'multiple'; specific count not published on public product page)
  performance:
    coremark_efficiency: 515 CoreMark @ ULPMark-CM 170 (configured for maximum processing efficiency)
    coremark_performance: 1290 CoreMark @ ULPMark-CM 132 (configured for maximum processing performance)
    processing_power_vs_nrf5340: doubled (vs previous flagship nRF5340)
  memory:
    nvm: 2 MB (non-volatile)
    ram: 1 MB (on-chip)
  wireless:
    ble_version: '6.0'
    protocols:
    - Bluetooth LE (LE Audio, LE Coded, Mesh, Direction Finding)
    - Thread
    - Matter
    - 2.4 GHz proprietary (up to 4 Mbps)
    radio: 4th generation multiprotocol 2.4 GHz radio
    rx_sensitivity_dbm:
      ble_1m: -99
      ieee_802_15_4_250kbps: -104
    tx_power_dbm_max: 10
    throughput_max_mbps: 4
    rx_current_ma: 1.7 (3V, DC/DC; class-leading for receive-dominant apps)
  security:
    certification: PSA Certified Level 3 (highest in PSA Certified IoT security standard)
    features:
    - Secure Boot
    - Secure Firmware Update
    - Secure Storage
    - Cryptographic accelerators (side-channel attack hardened)
    - Tamper sensors (detect attack in progress, can take protective action)
    - Isolated, physically protected security domain
  integration_benefit: Replaces external flash + application MCU + wireless SoC with single chip; smaller PCB and battery possible
