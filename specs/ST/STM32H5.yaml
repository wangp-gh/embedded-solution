- "New yaml entry on 2026-06-30 \u2014 extracted from st.com STM32H5 series page via Firecrawl (33,744 bytes raw)."
- 'Family differentiator vs STM32F4 (older): TrustZone + 250 MHz + dual-bank flash + up to 4 MB flash on F-line, with scalable
  ST security offer.'
- 'Family differentiator vs STM32H7 (higher-tier): H7 has Cortex-M7 480 MHz + more peripherals (FMC/SDMMC/OctoSPI standard).
  H5 wins on affordability + TrustZone.'
- 'Position: secure mainstream MCU, bridges STM32F4 (legacy) and STM32H7 (high performance) for IoT + Industrial + Medical
  apps.'
