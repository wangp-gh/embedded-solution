specs:
  family_identity:
    family: STM32H5
    tagline: Industry-first Cortex-M33 with TrustZone @ 250 MHz
    process: 40 nm (ST-optimized)
    pin_range: 25 to 225 pins
    ambient_temp_max_c: 125
  performance:
    core: Arm Cortex-M33 with TrustZone @ up to 250 MHz
    graphics: Chrom-ART2 (mid/high end)
    multimedia_accelerator:
    - MJPEG
    - PLAY
  sub_series:
  - name: H503
    flash_kb: 128
    ram_kb: 32
    notes: entry-level, no crypto
  - name: H523/H533
    flash_kb: 512
    ram_kb: 272
    notes: crypto available
  - name: H562
    flash_kb: 2048
    ram_kb: 640
    notes: cost-optimized
  - name: H563/H573
    flash_kb: 2048
    ram_kb: 640
    notes: Ethernet + SMPS option; H573 has hardware encryption accelerator
  - name: H5E4/H5F4
    flash_kb: 4096
    ram_kb: 1536
    notes: Ethernet, Chrom-ART2, TFT-LCD, MJPEG, PLAY, SMPS; F4 has hw crypto + TrustZone
  - name: H5E5/H5F5
    flash_kb: 4096
    ram_kb: 1536
    notes: USB-HS PHY + USB FS/UCPD; F5 has hw crypto + TrustZone
  flash: dual-bank
  peripherals:
    adc_12bit: 3 (mid/high end)
    fdcan: 3 (E4/F4 and above)
    ethernet: yes (F4/F5 and H563+)
    smps_option: yes (except H503)
    sdmmc: 2 (F4/F5)
    fmc: yes (F4/F5)
    octospi: 2 (F4/F5)
  usb:
    variants:
    - HS-PHY
    - FS
    - UCPD
  security:
    trustzone: yes (Cortex-M33 isolation)
    tees: STM32Trust TEE Secure Manager (X-CUBE-SEC-M-H5) on H573, H5F4, H5F5
    crypto:
    - AES
    - SAES
    - PKA
    - OTFDEC
    - HUK
    - ST-iROT
    ccb: yes on selected lines
    key_management: maintained by ST over product lifecycle
    certified_offer: true
  applications:
    smart_home:
    - Air conditioners
    - Refrigerators/freezers
    - Central alarm systems
    - Washing machines
    personal_electronics:
    - Keyboards
    - Smartphones
    - IoT tags and tracking devices
    smart_city:
    - Industrial communication
    - Lighting controls
    - Digital power
    medical_healthcare:
    - CPAP and respirators
    - Dialysis machines
    - Pills distributors
    - Powered patient beds
  dev_tools:
    discovery_kit: 2
    nucleo_boards: 4
    cube_packages:
    - STM32Cube MCU & MPU Packages
    - STM32Cube Expansion Packages (8 partner)
