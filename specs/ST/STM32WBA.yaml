  pin_options: [K=32, C=48, U=59]
- id: STM32WBA55
  cpu: Cortex-M33 @ 100 MHz (full feature set, SMPS)
  flash_options: [512 KB, 1 MB]
  ram_max: 128 KB
  protocols:
  - Bluetooth LE 6.0
  - IEEE 802.15.4-2015 (Thread, Matter, Zigbee)
  usb: none
