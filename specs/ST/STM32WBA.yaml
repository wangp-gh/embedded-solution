  pin_options: [K=32, C=48, U=59, H=41 WLCSP]
specs:
  cores:
  - Arm Cortex-M33 (WBA52/54/55 @ 100 MHz, all variants)
  wireless:
    radio: 2.4 GHz RADIO subsystem (single-ended RF, integrated balun)
    ble: 'Bluetooth LE 6.0 (LE 1M / LE 2M / LE Coded / Extended & Periodic Advertising / LE Audio / Direction Finding / Mesh)'
    ieee_802_15_4: 'Thread 1.4, Matter, Zigbee 3.0 (RX sensitivity -97.5 dBm @ 250 kbps)'
    rx_sensitivity_dbm:
      le_1mbps_sens: -96
      le_2mbps_sens: -93
      le_500kbps_sens: -99
      le_125kbps_sens: -102
      ieee_802_15_4_250kbps: -97.5
    tx_output_power_dbm: 10 (max, programmable with 1 dB steps; supports external PA)
    tx_current_ma:
      tx_0dbm_ldo: 13.6
      tx_0dbm_smps_vdd: 7.2
      tx_0dbm_smps_vdd11: 6.85
      tx_p10dbm_ldo: 25.3
      tx_p10dbm_smps: 22.7
    rx_current_ma:
      rx_ldo: 10.2
      rx_smps_vdd: 6.25
      rx_smps_vdd11: 5.52
    ble_advertising_avg_current_ua:
      period_1_28s_31bytes_3ch: 10.7
      period_10_24s_6bytes_3ch: 2.6
  security:
  - SESIP3 (Arm PSA L3 device capability)
  - TrustZone
  - Target certifications: RED, CRA, US CyberAct
  - AES hardware accelerator (AES)
  - SAES (Secure AES)
  - PKA (Public Key Accelerator)
  - HASH hardware accelerator (HASH)
  - True Random Number Generator (TRNG)
  - Active tamper pins (8x)
  flash_max: 1 MB (within A52/54/55; A52 datasheet covers 512 KB / 1 MB; A62 family extends to 2 MB but not in this datasheet)
  ram_max: 128 KB
  tx_power_dbm_max: 10
  voltage_v_min: 1.71
  voltage_v_max: 3.6
  power_consumption:
    run_mode_active_ua_per_mhz_3v3: 23
    radio_rx_ma: 4.4
    radio_tx_0dbm_ma: 5.2
    stop_mode_with_64kb_sram_ua: 6.5
    standby_mode_with_64kb_sram_ua: 0.9 (ULPMEN=1)
    standby_mode_min_na: 160 (16 wake-up pins)
    ldo_present: yes
    smps_present: yes (step-down converter, supports voltage scaling)
  operating_temperature_c:
    industrial_6_grade: '-40 to +85 (junction -40 to +105)'
    industrial_7_grade: '-40 to +105 (junction -40 to +120)'
  package_options:
  - UFQFPN32 (K = 32-pin, 5x5 mm)
  - UFQFPN48 (C = 48-pin, 7x7 mm)
  - UFBGA59 (U = 59-ball, 3.6x3.4 mm)
  - WLCSP41 (H = 41-ball, 2.5x2.5 mm, A55 only)
