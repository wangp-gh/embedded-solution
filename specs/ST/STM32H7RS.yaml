specs:
  family: STM32H7RS (bootflash-based MCU in STM32H7 series)
  architecture: 'bootflash-based: small internal flash + large SRAM; design for external memory scalability'
  cores:
  - Arm Cortex-M7 @ up to 600 MHz
  memory:
    user_flash_kb: 64
    sram_kb: 620
    external_memory: yes (scalable)
  sub_series:
  - name: H7R3
    line: general-purpose
  - name: H7S3
    line: general-purpose
    security: true
  - name: H7R7
    line: graphics
  - name: H7S7
    line: graphics
    security: true
  example_variants:
  - part: STM32H7S3L8
    package: TFBGA225
    flash_kb: 64
    sram_kb: 620
  - part: STM32H7S7L8
    package: TFBGA225
    flash_kb: 64
    sram_kb: 620
  operating_conditions:
    vdd_v: 1.71-3.6 (HSLV=0); 1.71-2.7 (HSLV=1)
    vdda_v: 1.62-3.6 (ADC used); 0-VDDA (ADC, VREFBUF not used)
    vdd33usb_v: 3.0-3.6 (USB used); 0-3.6 (USB not used)
    vddldo_v: 1.71-3.6
    vdd_smps_v: 1.71-3.6
    vddxspix_v: 1.62-3.6 (HSLV=0); 1.08-2.7 (HSLV=1)
    vbat_v: 1.2-3.6
    temperature_ambient_c: -40 to +85
    temperature_junction_c: -40 to +130
    package_options:
    - LQFP100
    - LQFP144
    - LQFP176
    - UFBGA144
    - UFBGA169
    - UFBGA176+25
    - TFBGA100
    - TFBGA225
    - VFQFPN68
    - WLCSP101
  security:
    features:
    - Secure Boot
    - Secure Firmware Installation (SFI)
    - Hardware encryption/decryption
    - TrustZone (peripherals isolation)
    cert_targets:
    - SESIP3
    - PSA Certified Level 3
  graphics_line_features:
  - Chrom-GRC (2.5D GPU-like rendering)
  - JPEG codec (encode + decode)
  - LCD-TFT controller (up to WXGA 1366x768)
  - DCMIPP (digital camera parallel interface)
  - Dual Octo-SPI (external memory)
  - PSSI (Parallel Synchronous Slave Interface for display)
  - ADF (Audio Digital Filter)
  - CRYP (Cryptographic accelerator)
  - RNG (True Random Number Generator)
  - VREFBUF (separate voltage reference buffer)
  use_cases:
  - MPU-like GUI applications with external memory
  - IoT secure end nodes (PSA L3 + SESIP3)
  - Medical devices (high-perf + strong security)
  - Industrial control panels with TFT-LCD
  - Secure HMI with secure boot + secure firmware install
  dev_tools:
    dev_kit: STM32H7S78-DK
    nucleo: NUCLEO-H7S3L8
    others: STM32H7B3I-DK, STM32H745I-DISCO
