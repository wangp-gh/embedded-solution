notes:
- "New yaml entry on 2026-06-30 \u2014 extracted from st.com STM32H7B0 value-line page via Firecrawl (23,203 bytes raw)."
- 'Family differentiator vs STM32H7 (existing yaml): H7 has full dual-core Cortex-M7 + M4 options + 1.4 MB SRAM + more peripherals;
  H7B0 is single-core Cortex-M7 + 128 KB Flash + Value line cost-efficient positioning.'
- 'Family differentiator vs STM32H7RS (recently added): H7RS is bootflash-based 64 KB Flash + 620 KB SRAM external-memory-first;
  H7B0 is 128 KB Flash on-chip + 1.4 MB SRAM (more traditional).'
- 'Use case: pick H7B0 over H7 when cost-efficient + Cortex-M7 single core + 128 KB Flash + 1.4 MB SRAM is sufficient. Pick
  H7RS over H7B0 when external memory scalability is critical.'
