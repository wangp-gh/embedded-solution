datasheet_source_note: 'Reichelt CDN mirror of st.com STM32U585 datasheet (DS13086, 350 pages).

  st.com is Cloudflare-gated as of 2026-06; this Reichelt mirror is the reliable route. Distinguishing feature vs U575: adds
  AES/PKA/OTFDEC crypto accelerators and SAES (secure AES) on top of the HASH unit.

  Sibling: STM32U575 (DS13737, akizukidenshi mirror) shares the same cores / flash / RAM / CoreMark / ULPMark numbers but
  lacks the crypto block. See specs/ST/STM32U575.yaml for the non-crypto variant.'
