unverified:
- exact SHA hash accelerator throughput (datasheet references CRYP + HASH + AES + TRNG hardware accelerators but per-algorithm throughput not in extracted sections)
- exact CORDIC + FMAC math accelerator cycle counts (datasheet references CORDIC and FMAC but specific cycles per function not in extracted sections)
- exact UFBGA64 (10x10 mm) thermal resistance per package variant (datasheet publishes theta_JA but specific values for this package not extracted)
- exact low-power Run mode current at 2 MHz (datasheet publishes Run mode table at 26 MHz + 150 MHz; 2 MHz low-power Run not extracted)
- exact AES key sizes supported (G4 series datasheet does not list AES hardware crypto in the security block; G4 security is limited to Flash read/write protection + Unique ID; for AES use STM32H5 or STM32U5)
notes:
- "New yaml entry on 2026-06-30 \u2014 extracted from st.com STM32G4 series page via Firecrawl (40,726 bytes raw)."
- 'Family differentiator vs STM32F3: 170 MHz (vs 72 MHz on F3), larger flash/ADC count, ART Accelerator, hi-res timer on G4x4.'
- 'Family differentiator vs STM32H5: H5 uses Cortex-M33 with TrustZone + dual-bank flash; G4 is wider analog + DSP optimized;
  H5 is mainstream secure MCU.'
- 'Use case: motor control (washing machines, drones), digital power converters, induction heating, high-end consumer (server
  fans, e-bikes), factory automation (lighting controllers).'
- '2026-07-10: source_pdf backfilled to vendor-direct stm32g474cb.pdf (3.06 MB, DS12288 Rev 6, 200 OK). Re-extracted via Tavily
  (extract_depth=advanced): confirmed SRAM 128 KB (80+16+32 KB partitioned), flash 128/256/512 KB per B/C/E code size,
  FDCAN 3 modules, 6 OPAMP with 13 MHz bandwidth rail-to-rail input/output + PGA (gain 2/4/8/16/32/64 non-inverting, -1/-3/-7/-15/-31/-63
  inverting), HRTIM + 5 GP timers + 2 basic + 1 LP, CORDIC + FMAC math accelerators, RNG, package pins C=48/R=64/M=80/M=81/V=100/P=121/Q=128.
  Resolved 3 of 4 unverified fields (SRAM size, FDCAN confirmed 3, OPAMP specs filled). AES reclassified (G4 series does not include
  AES hardware crypto).'
