specs:
  family: WIZnet Hardwired TCP/IP Ethernet Controller family (W5500)
  type: Hardwired TCP/IP Ethernet controller (SPI to LAN bridge)
  protocols_supported:
  - TCP
  - UDP
  - ICMP
  - IPv4
  - ARP
  - IGMP
  - PPPoE
  sockets: 8 (independent hardware sockets simultaneously)
  spi:
    mode: 0 and 3 (configurable)
    max_speed_mhz: 80 (high-speed SPI)
    note: 'New efficient SPI protocol for high-speed network communication'
  ethernet:
    phy: 10BaseT / 100BaseTX Ethernet PHY (integrated)
    mac: integrated 10/100 Ethernet MAC
    auto_negotiation: yes (full / half duplex)
  memory:
    tx_rx_buffer_kb: 32 (16 KB TX + 16 KB RX; per-socket 2 KB)
    ram_organization: '8 sockets x 2 KB TX + 8 sockets x 2 KB RX = 32 KB total'
  power_modes:
  - Normal mode (full operation)
  - Power Down mode (low standby current)
  - Wake on LAN (WOL) over UDP
  electrical:
    supply_voltage_v: '3.3 V (typ), 3.0-3.6 V range'
    dc_supply_voltage_max_v: 4.6 (absolute max)
    dc_input_voltage_max_v: 6 (5V tolerant I/O)
    dc_input_current_ma: ±5
    operating_temperature_c: -40 to +85
    junction_temp_max_c: 125
    storage_temperature_c: -65 to +150
  package_options:
  - type: LQFP
    pins: 48
  - type: QFN
    pins: 48
  use_cases:
  - IoT devices needing Ethernet (paired with simple MCU)
  - Industrial controllers (sensor to Ethernet bridge)
  - Smart home hubs (MQTT/Modbus TCP)
  - Web servers on embedded (no TCP/IP stack required on host)
  - Industrial IoT (Modbus TCP to Wi-Fi via companion module)
  - Security cameras (W5500-EVB-Pico)
  - Raspberry Pi Pico + W5500 add-on boards
  ecosystem:
    interfaces:
    - SPI (host MCU side)
    - 10/100 Ethernet (RJ45 transformer on PCB)
    driver_libraries:
    - ioLibrary_Driver (WIZnet official)
    - ioLibrary_Driver_BSD (BSD socket wrapper)
    - Arduino Ethernet library (compatible)
    frameworks:
    - Zephyr (W5500 driver)
    - Mbed OS
    - FreeRTOS (with ioLibrary)
    platforms:
    - Arduino (Ethernet shield uses W5500)
    - STM32 (Nucleo + W5500 modules)
    - Raspberry Pi Pico (W5500-EVB-Pico / -PoE)
    - ESP32 (with W5500 module for Ethernet; ESP32 has built-in Wi-Fi)
  product_lineage:
  - W5100 (predecessor, 16 KB buffer, 4 sockets)
  - W5200 (improved, 32 KB buffer, 8 sockets, 80 MHz SPI introduced)
  - W5500 (current, 80 MHz SPI, lower power, 5V tolerant I/O)
  - W6100 (next-gen, adds IPv6)
