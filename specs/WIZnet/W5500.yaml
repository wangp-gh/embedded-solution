notes:
- "New yaml entry 2026-07-10 — WIZnet W5500 is the gold standard for hardwired TCP/IP Ethernet controller.
  Unlike ESP32 (Wi-Fi only) or STM32 (no Ethernet built-in except STM32H7 high-tier), W5500 pairs with ANY
  MCU via SPI to add Ethernet connectivity with zero TCP/IP stack code on the host."
- 'Use case: simplest way to add 10/100 Ethernet to any MCU (Arduino, Raspberry Pi Pico, STM32, ESP32)
  with no Ethernet MAC/PHY integration or TCP/IP stack development. Used in 90% of "MCU + Ethernet" boards
  sold on AliExpress/LCSC. W5500-EVB-Pico is a popular RP2040 + W5500 combo board.'
- 'Family differentiator vs LAN8720A (Microchip Ethernet PHY only): LAN8720A is PHY-only and requires
  host MCU to implement TCP/IP stack (e.g., lwIP). W5500 is PHY + MAC + TCP/IP stack on chip, so the
  host MCU does not need Ethernet knowledge at all. W5500 wins on simplicity and "drop-in" approach;
  LAN8720A wins on flexibility (host can implement any custom protocol stack).'
- 'Family differentiator vs ESP32 (existing yaml set): ESP32 has built-in Wi-Fi + Bluetooth but NOT
  Ethernet. W5500 is the answer when you need wired Ethernet (industrial, automotive, EMI-sensitive
  environments). Pair W5500 + ESP32 + MCU for Wi-Fi + Ethernet + Bluetooth combination.'
- 'Verified 2026-07-10 via Tavily (extract_depth=advanced) on vendor-direct PDF: 40+ spec fields filled
  including protocols, sockets, SPI, Ethernet, memory, electrical, package. 4 unverified fields remain
  where datasheet details were not in extracted sections.'
