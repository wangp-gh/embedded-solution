specs:
  function: "RX family flagship 32-bit MCU \u2014 highest performance, with FPU and DSP"
  cores:
  - 32-bit RXv3 CPU core @ up to 240 MHz
  - 1396 CoreMark @ 240 MHz
  - Double-precision 64-bit IEEE-754 FPU
  - Trigonometric function arithmetic unit
  - Memory Protection Unit (MPU)
  - Register bank save function (16 banks, fast collective save/restore)
  - 'Address space: 4 GB linear'
  - "On-chip 32-bit multiplier (32\xD732 \u2192 64-bit) + divider (32/32 \u2192 32-bit) + 32-bit barrel shifter"
  flash:
    code_flash: up to 4 MB (dual-bank structure for firmware swap)
    data_flash: 32 KB (reprogrammable up to 100,000 times)
    rom_cache_performance: no wait @ up to 120 MHz, 1 wait above 120 MHz
    background_operation: true
  ram: 1 MB SRAM
  operating_voltage_v: 2.7 to 3.6 (single supply)
  low_power_modes: 4
  peripherals:
    ethernet_mac: 2 channels, IEEE 1588 compliant
    usb: USB 2.0 full-speed host/function/OTG (1 channel with PHY layer)
    can: 32 mailboxes, up to 3 channels (ISO11898-1 compliant)
    sci: up to 8 channels (SCIj + SCIh with async/clock-sync/smart-card/SPI/I2C modes)
    spi: QSPI supported
    sd_host: true
    adc12: 12-bit A/D converter
    rtc: true
    ssi: Serial sound interface
    camera_if: CMOS camera interface
    glcd_controller: Graphic-LCD controller
    drawing_engine: 2D drawing engine
    encryption: Encryption functions (optional)
  packages:
