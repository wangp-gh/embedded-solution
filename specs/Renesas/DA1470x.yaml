notes:
- 'Datasheet Rev 3.2 dated 10-Nov-2022. Page count: 1019 (Datasheet Revision footer on p.61/63).'
- DA1470x uniquely includes a 2D GPU + display controller — only BLE SoC in this family with integrated graphics. Differentiator vs DA1469x/DA1459x.
- All 16 fields from the original unverified list have been populated. Verified by manual read of pages 1-3 (features), 61 (operating conditions), 62-63 (DC characteristics).
- No internal flash — runs from external Octa/Quad SPI via on-the-fly decrypting engine. This is unusual for BLE SoCs and affects boot design (must include serial flash in BOM).
- Hibernation current 0.4 µA is exceptionally low; deep sleep 16.9 µA is high vs DA14706 because DA1470x has no RAM retention in deep sleep by default (DA14706 / DA1469x have lower deep-sleep with retention).
