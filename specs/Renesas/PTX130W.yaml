specs:
  function: NFC WLC Poller (transmitter) SoC for NFC wireless charging
  wireless_standard: NFC Forum Reader/Writer + Wireless Charging Technical Specification v2.1
  protocol: NFC Forum Reader/Writer + WLC v2.0
  host_interface: SPI
  output_power_max_W: 1.0
  rx_sensitivity_dbc: -80
  features:
  - NFC WLC Poller transmitter (up to 1W)
  - No EMC filter requirement (sine wave output + Direct Antenna Connection DiRAC)
  - Automated power control loop
  - Output power regulation with 1% step
  - NFC Forum WLC Poller functionality
  - NFC data exchange
  - Foreign object detection (FOD) via impedance change detection
  - On-chip processing of time critical commands
