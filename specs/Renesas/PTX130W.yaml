- Promoted from placeholder to verified_2026-06-29 — extracted from renesas.com PTX130W product page via Firecrawl (5KB clean markdown). Replaces 2026-06-20 placeholder that contained only wifi/ble/nfc:true flags. Family-level features and key parameters captured from product page; deep datasheet register map and electrical characteristics still require manual download from renesas.com myPortal.
- 'Use case: NFC wireless charging poller (transmitter side) — pairs with a PTX30W or similar WLC Listener IC on the device side. Typical in wearables (smart watches, hearables) and small IoT devices that need wireless charging without Qi coil complexity.'
- 'Family differentiator vs PTX30W: PTX130W is the Poller (transmitter) side; PTX30W is the Listener (receiver) side. They pair together for end-to-end NFC wireless charging.'
- Originally a Panthronics product (acquired by Renesas 2024); now distributed under renesas.com brand. Look for Panthronics legacy docs in archive.
