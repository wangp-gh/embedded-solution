      m7_tcm: 512 KB
      m4_tcm: 256 KB
  connectivity:
    ethernet:
    - 2x GbE with AVB (Audio Video Bridging)
    - 2x GbE with TSN (Time-Sensitive Networking)
    display_camera:
    - MIPI CSI (camera)
    - MIPI DSI (display)
    wireless: via companion ICs (e.g. IW612 Wi-Fi 6 + BT 5.4 + 802.15.4)
  multimedia:
    gpu: 2D GPU (vs RT1064's bare 2D acceleration engine)
  security:
    features:
    - Secure Boot
    - Hardware crypto engines
    - EdgeLock Assurance program part (NXP security-by-design)
  ecosystem:
    software:
    - MCUXpresso ecosystem (IDE, config, security provisioning, SDK)
    - Zephyr RTOS support
    related_products:
    - FS26 (ASILD safety system basis chip)
