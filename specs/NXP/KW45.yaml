specs:
  cores:
  - Arm Cortex-M33 @ up to 96 MHz (application core)
  - Arm Cortex-M3 (dedicated radio core)
  memory:
    program_flash: 1 MB
    sram: 128 kB
    radio_flash: 256 kB (authenticated NXP BLE stack firmware)
    radio_sram: 88 kB
  wireless:
    ble_version: 5.3 (Bluetooth LE 5.3 radio per datasheet Rev. 1, Sep 2020)
    rx_sensitivity_dbm_long_range:
    - -106 @ 125 kbps
    - -102 @ 500 kbps
    - -97.5 @ 1 Mbps
    - -95 @ 2 Mbps
    tx_power_dbm_max: 10
    simultaneous_connections: 24 (any central/peripheral combination)
    data_rates_kbps:
    - 125
    - 500
    - 1000
    - 2000
    modulations:
    - 2-FSK
    - GFSK
    - MSK
    - GMSK
  security:
    enclave: EdgeLock Secure Enclave
    features:
    - Secure boot and debug
    - AES-128/192/256 (ECB, CBC, CTR, GCM, CMAC, CCM)
    - ECC NIST P-192/224/256/384/521 + Curve25519
    - ECDH(E), SPAKE2+, JPAKE key exchange
    - PRINCE XEX on-the-fly flash decryption
    - Secure key storage
  power:
    typical_rx_current_ma: 4.7
    typical_tx_current_ma: 4.6 @ 0 dBm, 18.7 @ 10 dBm
    sleep_current_na: 100
    power_down_modes_min_na: 300
packages:
- HTQFP48 / HVQFN48 'Wettable flanck' (7 x 7 mm)
- HVQFN40 'Wettable flanck' (6 x 6 mm)
