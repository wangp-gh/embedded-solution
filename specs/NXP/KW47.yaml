specs:
  family: Kinetis W / MCX W Wireless MCU
  cores:
    application:
    - Arm Cortex-M33 @ up to 96 MHz
    radio_subsystem:
    - dedicated Cortex-M33 @ up to 64 MHz
    radio_subsystem_memory:
      flash_secure: 512 KB (supports upgradable software radio)
      sram: 171 KB (link layer optimized)
  memory:
    flash_max: 2 MB with ECC
    sram: 264 KB with ECC + parity
  wireless:
    protocol: Bluetooth Low Energy 6.x (upgradeable)
    rx_sensitivity_dbm:
      ble_125kbps_lr: -106
      ble_500kbps_lr: -102
      ble_1mbps: -97.5
      ble_2mbps: -95
    tx_power_max_dbm: 10
    simultaneous_connections_hw: 24
    data_rates_kbps:
    - 125
    - 500
    - 1000
    - 2000
    modulation:
    - 2-FSK
    - GFSK
    - MSK
    - GMSK
    channel_sounding: true
    on_chip_balun: yes (single-ended bidirectional RF)
  peripherals:
    adc_16bit: 2 Msps (single-ended SAR)
    comparators: 2 (high-speed, 8-bit DAC)
    voltage_ref_v_min: 1.0
    voltage_ref_v_max: 2.1
    timers:
    - 2x 6-channel 32-bit TPM (PWM + DMA)
    - 2x 32-bit LPTMR (low-power/pulse counter, compare)
    - 4-channel 32-bit LPIT (low-power periodic interrupt, DMA)
    - 56-bit timestamp timer
    - 32-bit seconds RTC with 32-bit alarm + independent VDD
    - Signal frequency analyzer (SFA)
  connectivity:
    flexcan_can_fd: true
  supply_voltage:
    vdd_ana_v: 1.71-3.6
    dcdc_in_v: 1.86-3.6
    ldo_in_v: 1.86-3.6
    core_ldo_v: 1.25-3.6
  operating_temperature:
    ambient_c: '-40 to +105'
    junction_c: '-40 to +125'
    qualification: AEC-Q100 Grade 2
  package_options:
  - 48 HVQFN 7x7x0.85 mm pitch 0.5 mm wettable flanks (29 GPIO)
  security_module: EdgeLock Secure Enclave
  use_cases:
  - Channel Sounding ranging (locator / finder)
  - 24-link industrial BLE mesh
  - Secure OTA firmware upgrade
  - Smart home / building automation (secure radio)
  - Asset tracking with ranging
unverified:
- exact analog comparator speed (datasheet specifies 2x high-speed CMP with 8-bit DAC but doesn't publish propagation delay in the extracted sections)
