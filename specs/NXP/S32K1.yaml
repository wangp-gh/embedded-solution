created_at: '2026-06-30T10:42:00+08:00'
specs:
  family: "S32K1 (automotive MCU family; 8 sub-series: S32K116 / S32K118 / S32K142 / S32K142W / S32K144 / S32K144W / S32K146 / S32K148)"
  cores:
    entry: Arm Cortex-M0+ @ up to 48 MHz (S32K11x sub-series)
    mid: Arm Cortex-M4F @ up to 80 / 112 MHz (S32K14x sub-series); HSRUN mode up to 112 MHz for K14xW variants
  memory:
    flash_kb_min: 128
    flash_kb_max: 2048
    flash_ecc: true
    eeprom: up to 4 KB (D-Flash, emulated by FlexRAM)
    sram_kb_per_subseries:
      S32K116: 16
      S32K118: 32
      S32K142: 32
      S32K144: 64
      S32K146: 96
      S32K148: 192
      S32K142W: 32
      S32K144W: 64
  operating_conditions:
    temperature_c_min: -40
    temperature_c_max_options:
    - 85
    - 105
    - 125
    - 135
    - 150
    automotive_qualified: AEC-Q100
    grades:
    - C-Grade: -40 to +85 C ambient (junction -40 to +105 C)
    - V-Grade: -40 to +105 C ambient (junction -40 to +125 C)
    - M-Grade: -40 to +125 C ambient (junction -40 to +135 C)
    longevity_years_min: 15
    hsrun_max_temp_c: 105 (HSRUN mode must not be used at 125C)
  peripherals:
    adc_12bit: 1 Msps
    timers_flextimer_16bit:
      count: 4 to 8 modules (per sub-series)
      channels_total: 26 to 30 (per package)
      features:
      - dead-time insertion
      - fault detection
      - quadrature decode
      - PWM generation
    lpit: 1x 4-channel (Low-Power Interrupt Timer)
    lptmr: 1x (Low-Power Timer)
    ethernet: 10/100 Mbit/s (on K14x higher-pin-count variants)
    can_fd_count_per_package:
      48-pin LQFP: 2x (each with 2x FD)
      64-pin LQFP: 2x (each with 2x FD)
    can_fd_total_per_package:
      48-pin LQFP: 2x CAN FD modules
      64-pin LQFP: 3x CAN FD modules
    flexio:
    - UART
    - "I\xB2C"
    - SPI
    - "I\xB2S"
    - LIN
    - PWM
    serial_audio_interface: true
    qspi: true
    sai: SAI (Synchronous Audio Interface)
  safety:
    iso_26262: up to ASIL B
    features:
    - Hardware watchdogs
    - Software watchdogs
    - Clock monitor (FIRC CMU)
    - Power monitor
    - Temperature monitor
    - ECC on Flash + SRAM
    - MPU (Memory Protection Unit)
    - External Watchdog Monitor (EWM)
    program: SafeAssure (NXP)
  security:
    csec: true
    aes_128: true
    secure_boot: true
    key_storage: true
    cryptographic_services_engine: CSEc (ISO 26262 compliant)
  power:
    modes:
    - Run
    - Stop1 / Stop2
    - VLPR (Very Low Power Run)
    - VLPS (Very Low Power Stop)
    - HSRUN (high-speed run, K14xW only, ≤105C ambient)
    - low-power Run
    - fast wake-up
    - clock gating
    - power gating
    wakeup_times_us:
      VLPS_to_RUN: 8-17
      STOP1_to_RUN: 0.075
      STOP2_to_RUN: 0.075
      VLPR_to_RUN: 19-26
  packages:
  - 32-pin QFN (S32K116 only)
  - 48-pin LQFP
  - 64-pin LQFP
  - 100-pin LQFP (S32K144 / S32K146 / S32K148)
  - 144-pin LQFP (S32K146 / S32K148)
  - 176-pin LQFP (S32K148)
  ecosystem:
  - S32 Design Studio IDE (Eclipse + GCC + debugger)
  - S32 SDK (production-grade, SPICE Level 3, MISRA)
  - NXP AUTOSAR MCAL (ISO 26262 + QM compliant)
  - NXP security firmware
  - Core Self-Test Library
  - "Real-Time Drivers (RTD) \u2014 ASIL compliant"
  - Safety Peripheral Drivers (SPD)
  - Model-Based Design Toolbox (MBDT) for MATLAB/Simulink
  - FreeMASTER (Lite)
  - Motor Control Application Tuning (MCAT)
  - Automotive Math and Motor Control Library (AMMCLib)
  related_products:
  - FS23 (Safety SBC + Power Management + CAN + LIN)
  - FS24 (Safety SBC ASIL B/D)
  use_cases:
  - Body & chassis ECUs (BCM, lighting, climate, doors, windows)
  - Battery Management System (BMS)
  - HVAC
  - ADAS L2 (LIDAR / radar front-end MCUs)
  - Sensor / actuator nodes
  - Industrial CAN nodes with ASIL B
  - Small motor control (solenoid, washer pump, mirror adjuster)
unverified:
- exact FlexTimer module count per sub-series beyond package-level range (4-8 modules, 26-30 channels total)
