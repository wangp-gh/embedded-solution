    - 105
    - 125
    - 150
    automotive_qualified: AEC-Q100
    grades:
    - Grade 0: "-40 to +150 \xB0C"
    - Grade 1: "-40 to +125 \xB0C"
    - Grade 2: "-40 to +105 \xB0C"
    longevity_years_min: 15
  peripherals:
    adc_12bit: 1 Msps
    timers_flextimer_16bit:
      features:
      - dead-time insertion
      - fault detection
    ethernet: 10/100 Mbit/s
    can_fd: true
    flexio:
    - UART
    - "I\xB2C"
    - SPI
    - "I\xB2S"
    - LIN
    - PWM
    serial_audio_interface: true
    qspi: true
  safety:
    iso_26262: up to ASIL B
