part: i.MX_RT700
link_status: verified_2026-07-10 (datasheet-pdf-vendor-direct-extracted)
expected_family: i.MX RT700 — Crossover MCU with M33 + HiFi 4 DSP + eIQ Neutron NPU
main_page: https://www.nxp.com/products/i.MX-RT700
datasheet_path_expected: ../../embedded_dev/nxp/datasheet/IMXRT700EC.pdf
created_at: '2026-06-30T09:43:00+08:00'
specs:
  cores:
    main_subsystem:
    - Arm Cortex-M33 @ up to 325 MHz
    - Tensilica HiFi 4 DSP @ up to 325 MHz
    - eIQ Neutron NPU @ up to 325 MHz (Edge AI)
    sense_subsystem:
    - Arm Cortex-M33 @ up to 250 MHz
    - Tensilica HiFi 1 DSP @ up to 250 MHz
  memory:
    sram_on_chip: 7.5 MB
    external_memory:
    - 3x xSPI interfaces
    - Up to 16-bit wide external memories
    - Up to 250 MHz DDR
  peripherals:
    eusb: integrated PHY
    sd_emmc: 2 interfaces (one supports eMMC 5.0 with HS400/DDR)
    usb_hs_host_device: on-chip PHY
    digital_mic: up to 8 channels
    serial:
    - UART
    - I²C
    - I3C
    - SPI
    - HSPI
    - SAI
  graphics:
    gpu_2_5d: vector acceleration + frame buffer compression
    ezh_v: RISC-V core with SIMD/DSP
    openvg: 1.1
    display_perf: 720p @ 60 FPS from on-chip SRAM
    lcd_interface: true
    display: MIPI DSI
    image_codec: JPEG + PNG (integrated)
    camera: CSI 8/10/16-bit parallel (via FlexIO)
  security:
    enclave: EdgeLock Secure Enclave (Core Profile)
    features:
    - Secure Boot
    - Secure Debug
    - TRNG
    - DICE (Device Identifier Composition Engine)
    - Unique ID (UID)
    - PUF (Physical Unclonable Function)
    - OTP
    - Crypto accelerators (PKC, AES, SHA)
    - Tamper detection
    - Intrusion detection
    - Device Attestation (DICE)
    - Life cycle management
  ecosystem:
  - MCUXpresso IDE/tools/SDK
  related_products:
  - PCA9420-PCA9421 (PMIC)
  - PCA9422 (PMIC)
  - i.MX-RT600 (predecessor: dual-core M33 + HiFi 4 DSP)
  - i.MX-RT500 (lower-tier AI crossover MCU)
  - i.MX 8ULP (MPU sibling for ultra-low-power)
  applications:
  - AI/ML edge inference (NPU-enabled)
  - Audio (smart speakers, hearables, voice assistants)
  - Wearable (smart watch, health band)
  - Smart home HMI (2.5D GPU + MIPI DSI)
  - Industrial HMI
unverified:
- exact FPU/double-precision support on M33 cores (datasheet Block Diagram Figure 4 confirms FPU on both M33 instances but does not publish FPv5 double-precision spec in extracted sections)
