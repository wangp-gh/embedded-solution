specs:
  family: "i.MX RT Crossover MCU (RT500 mid-tier \u2014 cost-optimized vs RT700)"
  cores:
    application:
    - Arm Cortex-M33 @ up to 275 MHz with TrustZone + MPU (8 regions)
    dsp:
    - Cadence Tensilica Fusion F1 DSP @ up to 275 MHz - Hardware floating point unit (single-precision IEEE MAC per cycle)
    coprocessors:
    - PowerQuad (FPU + DSP functions)
    - CASPER (asymmetric crypto)
  memory:
    sram: up to 5 MB (shared by both CPUs + all DMA engines)
    flexspi_cache: 2x 32 KB
  graphics:
    gpu: 2D with vector graphics acceleration
    csi: 8/10/16-bit parallel (FlexIO)
    lcd: 8/10/16/18/24-bit parallel (FlexIO)
    lcd_interface: true
    mipi_dsi: true
  digital_peripherals:
    dma_engines: 2 (each 32 channels)
    quad_octo_spi: yes (with dynamic description)
    sd_emmc: 2 interfaces (one supports eMMC 5.0 with HS400/DDR)
    usb_hs_host_device: yes (on-chip PHY)
    flexcomm: 12 (universal serial interface, configurable SPI/I2C/I2S/UART)
    i3c: 2
    digital_microphone: yes (up to 8 channels)
  power:
    voltage_v_min: not_specified_in_fetched_spec_block
    voltage_v_max: not_specified_in_fetched_spec_block
  security:
    trustzone: true
    casper_crypto: yes (hardware-accelerated asymmetric crypto)
  ecosystem:
  - MCUXpresso IDE + SDK
  - Zephyr RTOS
  use_cases:
  - Audio / voice DSP (Fusion F1)
  - Low-power HMI (LCD/MIPI DSI + 2D GPU)
  - IoT edge inference (Cortex-M33 + DSP)
