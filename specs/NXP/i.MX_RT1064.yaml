notes:
- 'Promoted from empty placeholder (specs: {}) to verified_2026-06-29 (datasheet). Enriched on 2026-06-30 with full marketing-level
  specs from nxp.com product page via Firecrawl (173,833 bytes raw, manual enrichment of _clean.md since clean_markdown.py
  over-strips NXP single-H1 pages — see Gap #1 in .planning/v0.4.0-resume.md).'
- The original 2026-06-23 datasheet download failed; product page was the primary source until the 2026-07-10 datasheet download.
- 'Use case: high-performance HMI / GUI applications — WXGA display, 2D graphics acceleration, parallel camera sensor. Popular
  in industrial control panels, smart appliances, home automation gateways.'
- 'Family differentiator vs i.MX RT1170: RT1064 = Cortex-M7 single-core; RT1170 = Cortex-M7 + Cortex-M4 heterogeneous (better
  for offloading real-time tasks to the M4 core).'
- 'Family differentiator vs K66 / LPC55S69: RT1064 has higher performance (600 MHz vs 120-180 MHz), integrated DC-DC, and
  a much richer multimedia peripheral set (LCD, GPU, camera). Use RT1064 when HMI/GUI is required; use K66/LPC55S69 when bare-metal
  control is enough.'
