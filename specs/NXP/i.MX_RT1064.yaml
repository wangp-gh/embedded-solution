specs:
  cores:
  - Arm Cortex-M7 @ up to 600 MHz (single core)
  performance:
    coremark: 3020
    dmips: 1284
    real_time_latency: 20 ns (interrupt response)
    low_power_run_modes: 24 MHz
  memory:
    sram: 1 MB on-chip (up to 512 KB configurable as TCM)
    flash: 4 MB on-chip (across all variants per Buy/Parametrics)
  peripherals:
    display: LCD controller up to WXGA 1366x768
    graphics: 2D graphics acceleration engine
    camera: parallel camera sensor interface
    audio: 3x I²S for multi-channel audio
    external_memory:
    - 8/16-bit SDRAM up to SDRAM-133/SDRAM-166
    - 8/16-bit SLC NAND FLASH with ECC handled in software
    - SD 3.0 / eMMC 4.5 (x2 USDHC interfaces)
    - SPI NOR/NAND FLASH
    - Parallel NOR FLASH with XIP support
    - Two single/dual channel Quad SPI FLASH with XIP support
    wireless_interface:
    - Wi-Fi
    - Bluetooth
    - BLE
    - Zigbee
    - Thread
    can: 2
    i2c: 4
    uart: 8
    usb_controllers: 2
    debug_trace: JTAG
    timers_pwm:
    - 2x General Programmable Timer (GPT) — 4-channel generic 32-bit resolution timer, supports standard capture/compare
    - 4-channel Periodic Interrupt Timer (PIT)
    - 4x Qtimer
    - 4x PWM
    - 4x ENC (encoder)
    - 4x WDOG
    security_features:
    - HAB (High Assurance Boot)
    - DCP (Data Co-Processor)
    - BEE (Bus Encryption Engine)
    - CSU (Central Security Unit)
    - TRNG (True Random Number Generator)
    - SNVS (Secure Non-Volatile Storage, with RTC)
  power:
    integrated_dcdc: true
    low_power_run_modes: 24 MHz
  part_variants:
  - part: MIMXRT1064CVJ5B
    speed_mhz: 528
    temp_c_min: -40
    temp_c_max: 105
    package: LFBGA196
    pitch_mm: 0.8
    status: Active
  - part: MIMXRT1064CVL5B
    speed_mhz: 528
