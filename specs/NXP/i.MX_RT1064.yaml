  - part: MIMXRT1064DVL6B
    speed_mhz: 600
    temp_c_min: 0
    temp_c_max: 95
    package: LFBGA196
    pitch_mm: 0.65
    status: Active
  ecosystem:
    software:
    - MCUXpresso suite (IDE, config tools, security, SDK)
    - Zephyr RTOS support
    related_products:
    - IW612 (wireless companion IC)
    - i.MX-RT1040 (entry-level sibling)
    - i.MX-RT1050 (previous generation)
    - i.MX-RT1060 (older variant)
  applications_summary:
    automotive:
    - HVAC
    - Motorcycle ECU / Small Engine Control
    consumer:
    - AC
    - Hearables
    - Major Home Appliances
    - Robotic Appliance
    - Small / Medium Appliances
    - Smart Watch / Wristband
    industrial:
    - Automatic Vehicle Identification
    - Building Energy Management
    - Building Safety
    - Building Security
    - Circuit Breaker
    - Electricity Metering
    - Fleet Management
    - General Avionics
    - Home Control Panel
    - In-Home Energy Display
    - Industrial HMI
    - Intermediate Flight Controller
    - Inventory / SCM
    - Motion Control / Robotics
    - Smart Lighting
    - Smart Power Socket
    - Solar PV
    - Transport Ticketing
