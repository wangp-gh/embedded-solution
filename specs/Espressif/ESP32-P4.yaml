specs:
  family: ESP32-P (application processor tier)
  wireless: none_in_soc
  cores:
    hp_core:
    - Dual-core 32-bit RISC-V @ up to 400 MHz (single-precision FPU + AI extensions)
    lp_core:
    - 1x 32-bit RISC-V LP-Core @ up to 40 MHz (low-power always-on)
  memory:
    sram: 768 KB (cache-able when external PSRAM present)
    tcm: 8 KB zero-wait
    external_psram: true
  hmi:
    camera:
    - MIPI-CSI with integrated ISP
    - Parallel camera interface
    - Up to 1080p resolution
    display:
    - MIPI-DSI
    - Parallel display interface
    - Up to 1080p resolution
    capacitive_touch: true
    speech_recognition: yes (hardware-accelerated)
    h264_encoding:
      max_performance: 1080p @ 30 fps
    hardware_accelerators:
    - Pixel Processing Accelerator (PPA)
    - 2D-DMA
  peripherals:
    gpio_count: 55
    spi: true
    i2s: true
    i2c: true
    led_pwm: true
    mcpwm: true
    rmt: true
    adc: true
    uart: true
    twai: true
    usb_otg_2_0_hs: true
    ethernet: true
    sdio_host_3_0: true
  security:
  - Secure Boot
  - Flash Encryption
  - Cryptographic accelerators
  - TRNG
  - Digital Signature Peripheral
  - Dedicated Key Management Unit (private keys generated within SoC)
  - Access Permission Management (hardware)
  - Privilege Separation
  os_support:
    esp_idf: yes (open-source Espressif SDK)
    freertos: true
    zephyr: true
    linux_via_companion: possible (ESP-HOSTED)
  use_cases:
  - Smart home hubs / control panels
  - Smart doorbell + facial recognition (edge AI camera)
  - Industrial 1080p HMI
  - POS terminals
  - Voice assistant with local wake-word
  - Edge AI gateway (paired with companion wireless)
