specs:
  family: ESP32-H (next-gen after ESP32-C)
  cores:
  - 2x 32-bit RISC-V @ up to 96 MHz (with DSP extensions)
  memory:
    sram: 384 KB
    rom: 128 KB
    external_psram_support: true
    external_memory: true
  wireless:
    bluetooth_le_5_4_with_6_0_certification:
    - LE Audio
    - LE Isochronous Channels (BIS/CIS)
    - Connection Subrating
    - Periodic Advertising with Responses (PAwR)
    - Direction Finding (AoA/AoD)
    - Bluetooth Channel Sounding
    ieee_802_15_4:
    - Thread 1.4
    - Zigbee 3.0
    - Matter-over-Thread
    - other mesh-based applications
  power:
    integrated_dcdc_converter: true
    low_power_modes: multiple
    selective_peripheral_activation: true
    reduced_max_tx_power: yes (for lower RF current)
    ble_advertising_without_cpu: true
  security:
    notes: "Espressif \"Affordable Security\" \u2014 secure boot, flash encryption, crypto accelerators, Digital Signature,\
      \ Key Manager, TEE (specifics in raw)."
  software:
    esp_idf: yes (open-source Espressif SDK)
    esp_at: yes (co-processor mode)
    esp_hosted: yes (co-processor mode)
  use_cases:
  - Wearables + LE Audio
  - Healthcare (CGM, ECG patches)
  - Battery-powered Matter-over-Thread devices
  - Low-power mesh sensor networks (BLE 5.4 PAwR)
