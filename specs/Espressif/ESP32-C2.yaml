specs:
  family: ESP32-C2 (entry-level RISC-V Wi-Fi SoC)
  cores:
  - RISC-V 32-bit single-core processor
  packaging:
    type: QFN
    size_mm: 4x4
  memory:
    sram_kb: 272
  wireless:
    wifi:
    - 802.11 b/g/n
    - 2.4 GHz
    - 20 MHz bandwidth
    - 802.11n MC7 packets 72.2 Mbps
    - Output power 18 dBm (typical)
    - 20 dBm FCC limit at low data-rates
    - RX sensitivity -97 to -100 dBm (1 Mbps 802.11b)
    - RX current 58 mA
    bluetooth:
    - Bluetooth LE (5.x)
  ai_features:
  - ESP RainMaker AIoT cloud support
  - Matter compatibility
  software:
    esp_idf: true
    esp_at: yes (slave mode)
    esp_hosted: yes (slave mode for master MCU)
  use_cases:
  - Cost-sensitive smart home (light switches, plugs)
  - Matter-compatible low-cost nodes
  - Master MCU pairs via ESP-Hosted (for STM32 / NXP / etc. host)
  - Simple IoT sensors with Wi-Fi + BLE
