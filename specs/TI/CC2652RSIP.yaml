notes:
- "New yaml entry on 2026-06-30 \u2014 extracted from ti.com CC2652RSIP product page via Firecrawl (278,074 bytes raw)."
- 'Family differentiator vs CC2652R (existing yaml): CC2652R is bare IC QFN package; CC2652RSIP is the same wireless MCU in
  a pre-certified SiP module (with integrated antenna + passives).'
- 'Family differentiator vs CC2642R (existing yaml): CC2642R is BLE-only; CC2652RSIP is multi-protocol (BLE + IEEE 802.15.4
  + Thread + Zigbee).'
- 'Use case: PCB-design simplifications; pre-certified wireless module for Matter / Zigbee / Thread / BLE products without
  needing separate RF certification cycle.'
