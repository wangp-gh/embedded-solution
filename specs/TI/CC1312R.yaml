notes:
- "New yaml entry on 2026-06-30 \u2014 extracted from ti.com CC1312R product page via Firecrawl (284,613 bytes raw)."
- 'Family differentiator vs CC1310 (existing yaml): CC1310 is older gen with smaller flash/RAM; CC1312R is 352 KB flash +
  80 KB SRAM + 150 nA shutdown + multi-band support + DMM.'
- "Family differentiator vs CC1352P (existing yaml round 2): CC1352P is multi-band (Sub-1 + 2.4 GHz) with integrated PA (+20\
  \ dBm); CC1312R is Sub-1 GHz only without PA (+14 dBm), but more ultra-low-power (150 nA shutdown vs 1.0 \xB5A standby on\
  \ CC1352P)."
- 'Cross-reference: comparable to NXP KW31Z (BLE 4.2 wireless MCU) in same ultra-low-power tier; CC1312R wins on range/sensitivity
  for Sub-1 GHz only.'
- 'Use case: km-range Sub-1 GHz sensor nodes (utility metering, building automation, precision agriculture).'
