- 'Use case: add Wi-Fi 6 + BLE 5.4 connectivity to a TI host MCU (CC32xx, CC13xx, MSPM0) via SDIO / SPI / UART interface.
  Common in IoT gateways, smart home hubs, industrial sensors needing Wi-Fi backhaul.'
- 'Family differentiator vs CC32xx: CC33xx is a companion IC (requires host MCU); CC32xx is an integrated SoC (Wi-Fi + Cortex-M4
  in one chip). For designs that already have a preferred host MCU, use CC3300/CC3301 to add Wi-Fi 6 without replacing the
  host.'
- 'CC3300 vs CC3301: CC3300 is Wi-Fi 6 only; CC3301 adds BLE 5.4. Choose CC3301 if BLE is also needed (most IoT designs need
  it).'
