specs:
  family: "MSPM0L (MSPM0 platform \u2014 low-power tier; sister to MSPM0G and MSPM0C)"
  cores:
  - Arm Cortex-M0+ @ up to 32 MHz (32-bit)
  memory:
    flash: 64 KB
    sram: 4 KB
    nvm: 64 KB
    flash_endurance:
      lower_32kb_cycles: 100000 (program/erase)
      upper_remaining_cycles: 10000 (program/erase, only on devices > 32KB flash; on 64KB MSPM0L1306 the upper 32KB uses 10k cycles)
  power:
    supply_voltage_v_min: 1.62
    supply_voltage_v_max: 3.6
    modes:
    - mode: RUN
      current: "71 \xB5A/MHz (CoreMark)"
    - mode: STOP @ 4 MHz
      current: "151 \xB5A"
    - mode: STOP @ 32 kHz
      current: "44 \xB5A"
    - mode: STANDBY
      current: "1.0 \xB5A"
      notes: "32-kHz 16-bit timer + SRAM/registers retained; 32 MHz wake-up in 3.2 \xB5s"
    - mode: SHUTDOWN
      current: 61 nA
      notes: IO wake-up capability
  analog:
    adc_12bit_1_68msps: yes (up to 10 external channels)
    adc_vref_selectable: 1.4 V or 2.5 V (internal)
    zero_drift_opa: "2x (0.5 \xB5V/\xB0C drift, 6-pA input bias, integrated 1-32x PGA)"
    gpamp: 1
    high_speed_comparator: "1 (32 ns propagation delay, <1 \xB5A LP mode, 8-bit ref DAC)"
    programmable_analog_routing: "yes (ADC \u2194 OPA \u2194 COMP \u2194 DAC)"
    temperature_sensor: integrated
  digital:
    dma_controller: 3-channel
    event_fabric: 3-channel
    timers: 4x 16-bit GP (8 PWM total, STANDBY-capable)
    watchdog: windowed
  communication:
    uart: 2 (one supports LIN/IrDA/DALI/Smart Card/Manchester; STANDBY-compatible)
    i2c: 2 (one supports FM+ 1 Mbit/s; both with SMBus, PMBus, STOP wakeup)
    spi: 1 (up to 16 Mbit/s)
  gpio_count_options:
  - 13
  - 20
  - 24
  - 28
  security:
    secure_debug: true
  operating_temp_c_min: -40
  operating_temp_c_max: 125
  operating_system: BareMetal (No OS)
  package_options:
  - type: SOT-23-THN (DYY)
    pins: 16
    dim_mm: 4.2x2
    area_mm2: 8.4
  - type: VQFN (RGE)
    pins: 24
    dim_mm: 4x4
    area_mm2: 16
  - type: VQFN (RHB)
    pins: 32
    dim_mm: 5x5
    area_mm2: 25
  - type: VSSOP (DGS)
    pins: 20
    dim_mm: 5.1x4.9
    area_mm2: 24.99
  - type: VSSOP (DGS)
    pins: 28
    dim_mm: 7.1x4.9
    area_mm2: 34.79
  - type: WQFN (RTR)
    pins: 16
    dim_mm: 2x3
    area_mm2: 6
  dev_tools:
    launchpad: LP-MSPM0L1306
    programmer: ALGO-3P-UISP1-TI (Algocraft)
    eval: DEYAN-3P-MSPM0-KIT
    debug_probes:
    - TMDSEMU110-U (XDS110)
    - TMDSEMU200-U (XDS200)
    - SEGGR-3P-J-LINK
  use_cases:
  - Battery-powered sensor nodes (61 nA SHUTDOWN = years on coin cell)
  - Wearables / health patches (CGM, ECG)
  - Industrial 4-20 mA loop sensors
  - Smoke detectors, water/gas meters
  - Smart locks, battery management
unverified:
- exact shutdown wake-up time (datasheet doesn't specify; STANDBY wake-up 3.2 us documented but SHUTDOWN wake-up time is left to user to derive)
- exact ADC DNL/INL specs (datasheet specifies 12-bit 1.68 Msps with >11-bit ENOB but doesn't publish DNL/INL in LSB)
