- exact ZCD (zero-crossover distortion) cancellation performance (datasheet doesn't include ZCD performance metrics)
notes:
- "New yaml entry on 2026-06-30 \u2014 extracted from ti.com MSPM0L1306 product page via Firecrawl (286,796 bytes raw)."
- 'Family differentiator vs MSPM0G3507 (already in yaml set): MSPM0L = ultra-low-power emphasis (61 nA SHUTDOWN, 5 lp modes),
  Cortex-M0+ @ 32 MHz; MSPM0G = general purpose @ 80 MHz with Cortex-M0+ but more memory and peripherals.'
- 'Family differentiator vs CC2340R5 (BLE wireless MCU): MSPM0L1306 is bare-host MCU for sensor front-end; CC2340R5 is wireless
  MCU (BLE + 802.15.4). Pair them for wireless sensor nodes.'
- 'Use case: ultra-low-power battery devices targeting 5-10+ year battery life on coin cell (e.g. smoke detectors, water meters).'
- 'Verified 2026-07-01 via pdfplumber against mspm0l1306.pdf: 19/21 spec fields matched (90%). Source: ti.com/lit/ds/symlink/<pn>.pdf
  (vendor-direct download, no auth required).'
