- "New yaml entry on 2026-06-30 \u2014 extracted from ti.com CC2642R product page via Firecrawl (295,261 bytes raw)."
- 'Family differentiator vs CC2640R2F (existing yaml): CC2640R2F is older BLE 5.0 + 128 KB flash; CC2642R is BLE 5.2 + 352
  KB flash + Direction Finding + better sensitivity (-105 dBm coded vs older).'
- 'Family differentiator vs CC2652R (existing yaml): CC2652R is multi- protocol (BLE + IEEE 802.15.4); CC2642R is BLE-only
  with deeper BLE feature set (Direction Finding, Advertising Extensions).'
- 'Family differentiator vs CC2340R5 (existing yaml round 2): CC2340R5 is Cortex-M0+ @ 48 MHz + BLE 5.4 + IEEE 802.15.4; CC2642R
  is Cortex-M4F @ 48 MHz + BLE 5.2 only (more compute, lower wireless range).'
- 'Use case: BLE 5.2 premium wireless peripheral with Direction Finding (AoA/AoD) for indoor positioning, or higher compute
  headroom than M0+.'
