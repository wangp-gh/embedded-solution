specs:
  family: SimpleLink CC33xx (Wi-Fi 6 + BLE companion IC series)
  wireless:
    wifi_6_802_11ax:
      band: 2.4 GHz
      channel_mhz: 20
      spatial_streams: 1
      mac_baseband_rf: integrated
      backward_compatibility:
      - 802.11 a/b/g/n/ax
      features:
      - OFDMA
      - trigger frame
      - MU-MIMO downlink
      - BSS coloring
      - TWT
      encryption_hardware:
      - WPA2
      - WPA3
      multirole: STA + AP concurrent
    bluetooth_le_5_4:
      phys:
      - LE Coded (long range)
      - LE 2M PHY (high speed)
      - advertising extension
      hci_transport:
      - UART
      - shared SDIO
    coexistence:
      pta:
      - 3-wire
      - 1-wire
  rf:
    integrated_pa_2_4ghz: true
    tx_power_max_dbm: 20.5
    application_throughput_mbps: 50
  host_interface:
  - 4-bit SDIO
  - SPI
  host_requirement: any processor/MCU capable of TCP/IP stack
  power:
    vmain_vio_vpp: 1.8 V
    vpa: 3.3 V
  clocks:
    xtal_fast: 40 MHz
    slow_clock_options:
    - internal slow clock
    - external 32.768 kHz
  operating_temp_c_min: -40
  operating_temp_c_max: 105
  security:
    features:
    - Secured host interface
    - Firmware authentication
    - Anti-rollback protection
  package:
    type: WQFN (RSB)
    pins: 40
    dim_mm: 5x5
    pitch_mm: 0.4
  os_support:
    host_side:
    - Android
    - FreeRTOS
    - Linux
    - Zephyr RTOS
  certifications:
    wifi_certified_chip: true
  use_cases:
  - Wi-Fi 6 + BLE 5.4 companion for any host MCU (i.MX-RT, STM32H7, ESP32-P4)
  - Industrial IoT gateway (Wi-Fi 6 + BLE 5.4, 50 Mbps, WPA3)
  - Smart home hub
  - Audio streaming
  - Replacement for CC3100/CC3200 (legacy Wi-Fi 4 only)
