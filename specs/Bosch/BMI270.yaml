notes:
- "New yaml entry 2026-07-10 — Bosch Sensortec BMI270 is the gold standard for ultra-low-power 6-axis
  IMUs. Used in Apple Watch (early generations), Google Pixel (compass fusion), Garmin wearables, and
  most high-end smart watches. Bosch's automotive-proven MEMS process gives it best-in-class zero-g
  offset and sensitivity drift."
- 'Use case: always-on gesture detection (sub-uA suspend + ~3.5 uA suspend + 10 uA A-only low-power),
  AR/VR controllers with low latency, fitness trackers, TWS earbuds with motion-based controls,
  GNSS trigger (turn on GPS only when motion detected).'
- 'Family differentiator vs ST LSM6DSOX (existing yaml ecosystem): LSM6DSOX is Cortex-M0+ integrated;
  BMI270 is pure IMU without MCU. BMI270 wins on lower power (3.5 uA suspend vs ~5 uA on LSM6DSO),
  built-in gesture library, and Bosch self-calibrating gyroscope. ST wins on integrated MCU (eliminates
  host MCU) and lower cost at low volumes.'
- 'Family differentiator vs TDK InvenSense ICM-42688-P (similar tier): ICM-42688-P has 6-axis + better
  noise floor (3 mdps/√Hz vs 8 mdps/√Hz for BMI270); BMI270 wins on lower power consumption
  (420 uA low-power vs ~700 uA for ICM-42688-P) and Bosch gesture library (not InvenSense MotionAware).'
- 'Verified 2026-07-10 via Tavily (extract_depth=advanced) on vendor-direct PDF: 60+ spec fields filled
  including full accelerometer / gyroscope characteristics, electrical specs, current consumption in 6
  different power modes, smart features list, and package dimensions. 4 unverified fields remain where
  datasheet details were not in extracted sections.'
