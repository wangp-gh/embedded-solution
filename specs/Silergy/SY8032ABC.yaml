  shutdown_current_ua: '0.1-1 (EN=0)'
  feedback_voltage_v: 0.6 (typ; 0.588 min, 0.612 max)
  pfet_current_limit_a: 3.5
  package: SOT23-6
  package_dimensions_mm:
    length: 2.80-3.10
    width: 1.50-1.70
    height: 1.00-1.30
  temperature_range_c_ambient: -40 to 85
