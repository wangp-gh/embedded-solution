    supply_voltage_v: 3.3
    design_topology: Capless (DC-blocking capacitors not required at output)
    shutdown_control: yes (pop/click-free on/off)
    gain_range: ±1 to ±10 V/V (external gain setting)
    input: Differential
    charge_pump: integrated (for negative rail generation, no separate supply needed)
  temperature_range_c: -40 to +85
  package: TSSOP-14
  pricing_usd: Not listed on product page — discontinued status
