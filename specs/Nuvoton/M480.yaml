notes:
- "New yaml entry 2026-07-10 — Nuvoton's flagship industrial Cortex-M4F MCU series. Taiwan-based Nuvoton is
  a direct competitor to NXP K66 / STM32F4 in industrial control applications. Ethernet + USB HS + Crypto
  + Camera Interface makes M487 the highest-tier variant for IoT edge gateways."
- 'Use case: industrial IoT edge nodes with Ethernet connectivity, USB peripherals, motor control with
  EPWM + QEI, secure boot for firmware integrity, sensor networks with 1 uA standby.'
- 'Family differentiator vs STM32F4 / STM32G4 (existing yaml set): M480 is Cortex-M4F @ 192 MHz vs
  STM32F4 @ 180 MHz Cortex-M4F; M480 has built-in hardware crypto engine (AES/DES/SHA/RSA/ECC) vs
  STM32F4 (no crypto) and STM32G4 (only basic crypto); M480 has 2.5 MB flash (much larger than STM32G4
  512 KB). But M480 lacks FPU DSP extensions that STM32G4 has.'
- 'Family differentiator vs NXP K66 (existing yaml set): both are Cortex-M4F @ 180-192 MHz with Ethernet;
  NXP K66 has Cortex-M4 + Cortex-M0+ asymmetric dual-core (no asymmetric on M480); M480 has
  larger flash (2.5 MB vs 1 MB on K66) but M480 lacks K66-specific industrial Ethernet TSN features.'
- 'Verified 2026-07-10 via Tavily (extract_depth=advanced) on vendor-direct PDF: 60+ spec fields
  filled including all sub-series, 9 package options with thermal data, full peripheral set, security
  features, and 1.8-3.6V operating conditions. 3 unverified fields remain (specific ESD ratings, QFN88/
  LQFP100 thermal data, WLCSP pin count) where datasheet does not provide single-value answers.'
